<svg width="1024" height="1024" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Metallic face gradients -->
    <linearGradient id="gTop" x1="64" y1="18" x2="64" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#eef0f3"/>
      <stop offset="1" stop-color="#c4cad2"/>
    </linearGradient>
    <linearGradient id="gLeft" x1="20" y1="42" x2="64" y2="122" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#cfd4db"/>
      <stop offset="0.5" stop-color="#aab1bb"/>
      <stop offset="1" stop-color="#848b96"/>
    </linearGradient>
    <linearGradient id="gRight" x1="108" y1="42" x2="70" y2="122" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f4f6f8"/>
      <stop offset="0.5" stop-color="#d3d8de"/>
      <stop offset="1" stop-color="#a6adb7"/>
    </linearGradient>
    <!-- Soft sheen sweeping across the top face -->
    <linearGradient id="sheen" x1="22" y1="22" x2="100" y2="66" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="3" flood-color="#1a1d22" flood-opacity="0.45"/>
    </filter>
  </defs>

  <g filter="url(#shadow)" stroke-linejoin="round" stroke-linecap="round">
    <!-- Top face (diamond). Each face is inset ~10% around its centroid to create the signature gaps. -->
    <g transform="translate(64 45) scale(0.9) translate(-64 -45)">
      <path d="M64 18 L108 44 L64 70 L20 44 Z" fill="url(#gTop)" stroke="#ffffff" stroke-opacity="0.7" stroke-width="1.2"/>
      <path d="M64 18 L108 44 L64 70 L20 44 Z" fill="url(#sheen)"/>
    </g>

    <!-- Left face -->
    <g transform="translate(42 82.5) scale(0.9) translate(-42 -82.5)">
      <path d="M20 44 L64 70 L64 122 L20 96 Z" fill="url(#gLeft)" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1"/>
    </g>

    <!-- Right face -->
    <g transform="translate(86 82.5) scale(0.9) translate(-86 -82.5)">
      <path d="M108 44 L108 96 L64 122 L64 70 Z" fill="url(#gRight)" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1"/>
    </g>
  </g>
</svg>
