appId: com.acmediamarketing.tokenmaxxing
productName: TokenMaxxing
copyright: Copyright © 2026 Launchcraft Studio

directories:
  buildResources: resources
  output: dist

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!server/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc,.prettierrc,.editorconfig}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,tailwind.config.ts,postcss.config.js}'

asarUnpack:
  - resources/**
  - '**/*.node'
  # sql.js WASM must live on disk (read via fs at runtime).
  - '**/sql.js/dist/*.wasm'

# Runtime-loaded assets copied into Contents/Resources.
extraResources:
  - from: resources/icon.png
    to: icon.png
  - from: resources/trayTemplate.png
    to: trayTemplate.png
  - from: resources/trayTemplate@2x.png
    to: trayTemplate@2x.png

# better-sqlite3 is a native module — keep it unpacked
npmRebuild: true

mac:
  category: public.app-category.developer-tools
  # Apple Silicon (M-series) builds.
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist

# Stable DMG filename (no version/arch) → TokenMaxxing.dmg, so the download URL
# never changes. The auto-update .zip keeps its default (versioned) name.
dmg:
  artifactName: ${productName}.${ext}

win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: Launchcraft Studio <hello@acmediamarketing.com>

protocols:
  - name: TokenMaxxing
    schemes:
      - tokenmaxxing

publish:
  provider: github
  owner: Launch-Craft
  repo: TokenMaxxing-Desktop
  # Publish a real (non-draft) release so `releases/latest/download/...` resolves.
  releaseType: release
