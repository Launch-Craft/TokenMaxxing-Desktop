name: Release desktop app

# Releases automatically when you push to main — but only when the version in
# package.json doesn't already have a release. So: bump the version → push →
# new release; ordinary commits at the same version are a no-op.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sign:
        description: 'Try signing + notarizing in CI (UNRELIABLE — codesign hangs on hosted runners). Prefer `npm run release:local` on your Mac. Default off = fast unsigned build.'
        type: boolean
        default: false

# Lets the built-in GITHUB_TOKEN create the GitHub Release + tag.
permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest # Apple Silicon runner → arm64 build
    timeout-minutes: 30 # unsigned builds are ~5 min; bounds a manual signed run that hangs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need tags to detect an existing release

      - name: Resolve version tag
        id: v
        run: echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if this version is already released
        id: guard
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.v.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Release ${{ steps.v.outputs.tag }} already exists — bump the version in package.json to publish a new one."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.guard.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Python build deps
        if: steps.guard.outputs.exists == 'false'
        run: python3 -m pip install --break-system-packages setuptools || true

      - name: Install dependencies
        if: steps.guard.outputs.exists == 'false'
        run: npm ci

      - name: Typecheck
        if: steps.guard.outputs.exists == 'false'
        run: npm run typecheck

      - name: Build bundles
        if: steps.guard.outputs.exists == 'false'
        run: npm run build

      # Import the Developer ID cert into a properly-configured keychain BEFORE
      # electron-builder runs. This is the fix for codesign hanging on CI: this
      # action runs `security set-key-partition-list`, which lets codesign use the
      # private key non-interactively. Without it, codesign blocks on an invisible
      # keychain-access prompt that can never be answered on a headless runner,
      # and the build hangs until it times out. Skipped for fast/unsigned builds.
      # (v3 is stable and battle-tested; v6/v7 exist with the same inputs.)
      - name: Import signing certificate
        if: steps.guard.outputs.exists == 'false' && github.event.inputs.sign == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CSC_LINK }}
          p12-password: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Package & publish to GitHub Releases
        if: steps.guard.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CI defaults to a FAST UNSIGNED build. Signed/notarized releases are
          # produced on a Mac via `npm run release:local` — codesign reliably hangs
          # on GitHub's hosted runners (keychain access + Apple's timestamp server),
          # so we don't sign here by default. Manual sign=true is opt-in but still
          # prone to hanging; local is the supported path.
          SIGN: ${{ github.event.inputs.sign == 'true' && 'true' || 'false' }}
          # Notarization creds (used by scripts/notarize.cjs). Only used when SIGN=true.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Verbose logs for signing + notarization so we can see exactly where a
          # slow/hung build is stuck (which file codesign is on, notarize upload, …).
          DEBUG: 'electron-builder,@electron/notarize*'
        run: |
          if [ "$SIGN" != "true" ]; then
            # Fast path: no cert was imported, so disable signing discovery and
            # skip Apple. afterPack ad-hoc signs instead (user gets a one-time
            # Gatekeeper prompt). Run with sign=true for a clean, notarized build.
            echo "Signing disabled → fast ad-hoc build. Run with sign=true to notarize."
            unset APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npx electron-builder --mac --publish always
