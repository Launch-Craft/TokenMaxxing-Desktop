name: Release desktop app

# Push a version tag (e.g. v0.1.0) → builds the macOS app and publishes it to a
# GitHub Release with the .dmg/.zip attached. Also runnable manually.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Lets the built-in GITHUB_TOKEN create/update the GitHub Release.
permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest # Apple Silicon runner → arm64 build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Best-effort: Python 3.12 dropped distutils, which some native builds need.
      - name: Python build deps
        run: python3 -m pip install --break-system-packages setuptools || true

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build bundles
        run: npm run build

      # electron-builder reads the `publish` block in electron-builder.yml
      # (owner: Launch-Craft, repo: TokenMaxxing-Desktop) and uploads the
      # installers to the GitHub Release. `--publish always` does the upload.
      - name: Package & publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false' # skip code signing (no Apple cert)
        run: npx electron-builder --mac --publish always
