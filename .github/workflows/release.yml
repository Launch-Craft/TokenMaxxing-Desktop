name: Release desktop app

# Releases automatically when you push to main — but only when the version in
# package.json doesn't already have a release. So: bump the version → push →
# new release; ordinary commits at the same version are a no-op.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sign:
        description: 'Sign + notarize with Apple Developer ID (slow, ~20-30 min). Off = fast ad-hoc build.'
        type: boolean
        default: false

# Lets the built-in GITHUB_TOKEN create the GitHub Release + tag.
permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest # Apple Silicon runner → arm64 build
    timeout-minutes: 40 # bound runaway signing/notarization hangs (fast path is ~5 min)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need tags to detect an existing release

      - name: Resolve version tag
        id: v
        run: echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if this version is already released
        id: guard
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.v.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Release ${{ steps.v.outputs.tag }} already exists — bump the version in package.json to publish a new one."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.guard.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Python build deps
        if: steps.guard.outputs.exists == 'false'
        run: python3 -m pip install --break-system-packages setuptools || true

      - name: Install dependencies
        if: steps.guard.outputs.exists == 'false'
        run: npm ci

      - name: Typecheck
        if: steps.guard.outputs.exists == 'false'
        run: npm run typecheck

      - name: Build bundles
        if: steps.guard.outputs.exists == 'false'
        run: npm run build

      - name: Package & publish to GitHub Releases
        if: steps.guard.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple signing + notarization is opt-in (slow: ~20-30 min on Apple's
          # servers). Default builds take the fast ad-hoc path. Re-enable by
          # running the workflow manually with sign=true.
          SIGN: ${{ github.event.inputs.sign || 'false' }}
          # Code signing (Developer ID .p12 as base64). Only used when SIGN=true.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization creds (used by scripts/notarize.cjs). Only used when SIGN=true.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEBUG: '@electron/notarize*' # progress logs if notarization is ever enabled
        run: |
          if [ "$SIGN" != "true" ]; then
            # Fast path: strip the cert/Apple creds so electron-builder skips
            # Developer ID signing and scripts/notarize.cjs skips Apple. afterPack
            # ad-hoc signs instead (user gets a one-time right-click→Open prompt).
            echo "Signing disabled → fast ad-hoc build. Run with sign=true to notarize."
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npx electron-builder --mac --publish always
